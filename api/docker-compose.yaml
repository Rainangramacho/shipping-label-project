services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: shipping_app
    volumes:
      - ./:/var/www
    ports:
      - "8035:8035"
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8035

  mysql:
    image: mysql:8.4
    container_name: shipping_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shipping
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3306"